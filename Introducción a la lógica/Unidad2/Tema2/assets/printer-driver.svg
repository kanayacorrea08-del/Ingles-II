<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Segoe UI, Arial" font-size="28" fill="#166534" font-weight="700">Printer Driver Installation Sequence</text>
  <rect x="80" y="95" width="190" height="58" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="102" y="130" font-size="18" font-family="Segoe UI" fill="#166534" font-weight="700">1 Download driver</text>
  <rect x="305" y="95" width="190" height="58" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="130" font-size="18" font-family="Segoe UI" fill="#166534" font-weight="700">2 Open installer</text>
  <rect x="530" y="95" width="190" height="58" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="555" y="130" font-size="18" font-family="Segoe UI" fill="#166534" font-weight="700">3 Connect printer</text>
  <line x1="270" y1="124" x2="305" y2="124" stroke="#22c55e" stroke-width="4"/>
  <line x1="495" y1="124" x2="530" y2="124" stroke="#22c55e" stroke-width="4"/>
  <rect x="190" y="195" width="190" height="58" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="218" y="230" font-size="18" font-family="Segoe UI" fill="#14532d" font-weight="700">4 Restart PC</text>
  <rect x="420" y="195" width="190" height="58" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="445" y="230" font-size="18" font-family="Segoe UI" fill="#14532d" font-weight="700">5 Print test page</text>
  <line x1="380" y1="224" x2="420" y2="224" stroke="#22c55e" stroke-width="4"/>
  <text x="40" y="315" font-size="19" font-family="Segoe UI, Arial" fill="#334155">Use connectors: First, Next, Then, After that, Finally.</text>
</svg>
